<svg viewBox="0 0 360 360" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <radialGradient id="plate" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2f1"/>
    </radialGradient>
    <linearGradient id="leaf1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="leaf2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <!-- sjena -->
  <ellipse cx="180" cy="320" rx="140" ry="20" fill="#000000" opacity="0.10"/>

  <!-- tanjur -->
  <circle cx="180" cy="178" r="150" fill="url(#plate)"/>
  <circle cx="180" cy="178" r="150" fill="none" stroke="#ffffff" stroke-width="6"/>
  <circle cx="180" cy="178" r="120" fill="none" stroke="#e2e8e6" stroke-width="2"/>

  <!-- lisnato povrce -->
  <g>
    <ellipse cx="150" cy="150" rx="52" ry="30" fill="url(#leaf1)" transform="rotate(-25 150 150)"/>
    <ellipse cx="205" cy="160" rx="48" ry="28" fill="url(#leaf2)" transform="rotate(20 205 160)"/>
    <ellipse cx="175" cy="200" rx="55" ry="30" fill="url(#leaf1)" transform="rotate(8 175 200)"/>
    <path d="M150 150 q -10 -20 6 -36" stroke="#047857" stroke-width="3" fill="none" opacity="0.5"/>
    <path d="M205 160 q 12 -16 2 -34" stroke="#047857" stroke-width="3" fill="none" opacity="0.5"/>
  </g>

  <!-- cherry rajcice -->
  <g>
    <circle cx="135" cy="200" r="20" fill="#ef4444"/>
    <circle cx="135" cy="200" r="20" fill="none" stroke="#dc2626" stroke-width="2"/>
    <ellipse cx="128" cy="192" rx="6" ry="4" fill="#ffffff" opacity="0.5"/>
    <circle cx="222" cy="200" r="17" fill="#f87171"/>
    <ellipse cx="216" cy="194" rx="5" ry="3" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- mrkva / narancasti komadi -->
  <g fill="#f59e0b">
    <rect x="196" y="128" width="34" height="13" rx="6" transform="rotate(28 196 128)"/>
    <rect x="120" y="170" width="30" height="12" rx="6" transform="rotate(-18 120 170)"/>
  </g>

  <!-- avokado -->
  <g>
    <path d="M170 210 a 26 18 0 0 0 44 -6 a 26 18 0 0 0 -44 6 z" fill="#86efac"/>
    <circle cx="192" cy="207" r="7" fill="#a16207"/>
  </g>

  <!-- sezam tockice -->
  <g fill="#fde68a">
    <circle cx="165" cy="135" r="3"/>
    <circle cx="190" cy="180" r="3"/>
    <circle cx="158" cy="178" r="3"/>
    <circle cx="210" cy="178" r="3"/>
  </g>
</svg>
